<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>パスポート漢字練習アプリ</title>

<script src="questions.js"></script>

<style>

body{
  font-size:24px;
  margin:20px;
  background:#f5f7fb;
  font-family:"Yu Gothic","Meiryo",sans-serif;
}

#setup,
#quiz{
  max-width:900px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h1{
  text-align:center;
  background:#1976d2;
  color:white;
  padding:15px;
  border-radius:15px;
}

h2{
  color:#1976d2;
  border-left:8px solid #1976d2;
  padding-left:10px;
}

p{
  margin-bottom:8px;
}

input,
select,
button{
  font-size:24px;
  padding:10px;
}

input[type="text"],
input[type="number"]{
  width:95%;
}

input[type="checkbox"]{
  width:auto;
  margin-right:8px;
}

input,
select{
  border:1px solid #ccc;
  border-radius:8px;
}

label{
  display:block;
  margin-bottom:6px;
}

button{
  margin-top:15px;
  background:#1976d2;
  color:white;
  border:none;
  border-radius:10px;
  padding:12px 20px;
  cursor:pointer;
}

button:hover{
  background:#1565c0;
}

#quiz{
  margin-top:20px;
}

#quiz p{
  background:#f8f9ff;
  padding:12px;
  border-radius:10px;
  border-left:5px solid #1976d2;
}

</style>

</head>

<body>

<h1>高校漢字テスト</h1>

<div id="setup">

<p>氏名</p>
<input id="studentName" type="text">

<p>学年</p>

<select id="grade">
<option value="">選択してください</option>
<option value="2年">2年</option>
<option value="3年">3年</option>
</select>

<p>クラス</p>

<select id="className">
<option value="">選択してください</option>
<option value="1組">1組</option>
<option value="2組">2組</option>
<option value="3組">3組</option>
<option value="4組">4組</option>
<option value="5組">5組</option>
</select>

<p>出席番号</p>

<input
id="number"
type="number"
min="1"
max="50"
>

<h2>出題範囲</h2>

<label><input type="checkbox" id="lesson5">第5回</label>
<label><input type="checkbox" id="lesson6">第6回</label>
<label><input type="checkbox" id="lesson7">第7回</label>
<label><input type="checkbox" id="lesson8">第8回</label>
<label><input type="checkbox" id="lesson9">第9回</label>
<label><input type="checkbox" id="lesson10">第10回</label>
<label><input type="checkbox" id="lesson11">第11回</label>
<label><input type="checkbox" id="lesson12">第12回</label>
<label><input type="checkbox" id="lesson13">第13回</label>
<label><input type="checkbox" id="lesson14">第14回</label>

<button onclick="startTest()">
テスト開始
</button>

</div>

<div id="quiz"></div>

</body>
</html>
